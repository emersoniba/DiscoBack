version: '3.9'

services:

  backend:
    build: .
    container_name: disco_backend

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app
      - /app/__pycache__ 

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:17

    container_name: disco_db

    restart: always

    environment:
      POSTGRES_DB: disco_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: